name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run tests
        run: dotnet test LaunchPad.Tests/ --configuration Release --verbosity normal

      - name: Build MSIX package
        run: >
          msbuild LaunchPad.sln
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundle=Never
          /p:AppxPackageSigningEnabled=false
          /restore

      - name: Find MSIX
        id: find-msix
        run: |
          $msix = Get-ChildItem -Path "LaunchPad.Package\AppPackages" -Recurse -Filter "*.msix" | Select-Object -First 1
          if (-not $msix) { Write-Error "No MSIX found"; exit 1 }
          Write-Host "Found: $($msix.FullName)"
          echo "MSIX_PATH=$($msix.FullName)" >> $env:GITHUB_ENV
          echo "MSIX_NAME=$($msix.Name)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            1. Enable **Developer Mode** in Windows Settings → System → For Developers
            2. Download the `.msix` file below
            3. Double-click to install
            4. Open Game Bar (Win+G) and enable the LaunchPad widget from the widget menu

            ## Requirements

            - Windows 10 19041+ with Xbox Game Bar
            - Developer Mode enabled (for sideloading)
          files: |
            ${{ env.MSIX_PATH }}
